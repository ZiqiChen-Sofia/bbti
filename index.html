<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BBTI 羽毛球人格测试 🏸</title>
  <meta name="description" content="24道球场情景题，找到你的球场灵魂。16种羽毛球人格，你是哪一种？">
  <meta property="og:title" content="BBTI 羽毛球人格测试 🏸">
  <meta property="og:description" content="24道球场情景题，找到你的球场灵魂">
  <meta property="og:type" content="website">
  <style>
    /* ============================================================
       Design Tokens
       ============================================================ */
    :root {
      --color-primary: #2ECC71;
      --color-primary-dark: #27AE60;
      --color-accent: #F39C12;
      --color-accent-light: #FEF5E7;
      --color-accent-dark: #E67E22;
      --color-bg: #FAFAF5;
      --color-text: #2C3E50;
      --color-text-secondary: #7F8C8D;
      --color-card: #FFFFFF;
      --color-border: #E8E8E3;
      --color-partner: #E8F8F5;
      --color-partner-border: #2ECC71;
      --color-rival: #FDEDEC;
      --color-rival-border: #E74C3C;
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --shadow-card: 0 2px 12px rgba(0,0,0,0.06);
      --shadow-btn: 0 4px 16px rgba(243,156,18,0.25);
      --transition-fast: 200ms ease;
      --transition-slide: 350ms cubic-bezier(0.4, 0, 0.2, 1);
      --max-width: 440px;
      --spacing-page: 20px;
    }

    /* ============================================================
       Reset & Base
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overscroll-behavior: none;
      min-height: 100vh;
    }
    button {
      font-family: inherit;
      font-size: inherit;
      cursor: pointer;
      border: none;
      background: none;
      color: inherit;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    img { max-width: 100%; display: block; }

    /* ============================================================
       View System
       ============================================================ */
    .view {
      display: none;
      min-height: 100vh;
      width: 100%;
    }
    .view.active {
      display: flex;
      flex-direction: column;
      animation: fadeIn 300ms ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .page-container {
      width: 100%;
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 var(--spacing-page);
    }

    /* ============================================================
       Home View
       ============================================================ */
    .home-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 40px var(--spacing-page);
    }
    .hero-emoji {
      font-size: 80px;
      line-height: 1;
      margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .home-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }
    .home-subtitle {
      font-size: 16px;
      color: var(--color-text-secondary);
      margin-bottom: 6px;
      line-height: 1.6;
    }
    .cta-primary {
      display: inline-block;
      margin-top: 32px;
      padding: 16px 48px;
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      background: var(--color-accent);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-btn);
      transition: transform var(--transition-fast), box-shadow var(--transition-fast);
    }
    .cta-primary:active {
      transform: scale(0.97);
      box-shadow: 0 2px 8px rgba(243,156,18,0.2);
    }
    .dimension-preview {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 16px;
      margin-top: 36px;
      font-size: 14px;
      color: var(--color-text-secondary);
    }
    .dimension-preview span {
      white-space: nowrap;
    }

    /* ============================================================
       Quiz View
       ============================================================ */
    .quiz-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--color-bg);
      padding: 16px var(--spacing-page) 12px;
      max-width: var(--max-width);
      margin: 0 auto;
      width: 100%;
    }
    .progress-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: var(--color-text-secondary);
      margin-bottom: 8px;
    }
    .progress-track {
      width: 100%;
      height: 6px;
      background: var(--color-border);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--color-accent), var(--color-primary));
      border-radius: 3px;
      transition: width var(--transition-slide);
      width: 0%;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 14px;
      color: var(--color-text-secondary);
      padding: 8px 0;
      margin-top: 4px;
      transition: color var(--transition-fast);
      visibility: hidden;
    }
    .back-btn.visible { visibility: visible; }
    .back-btn:active { color: var(--color-text); }

    .quiz-stage-container {
      position: relative;
      overflow: hidden;
      flex: 1;
      max-width: var(--max-width);
      margin: 0 auto;
      width: 100%;
    }
    .quiz-stage {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 20px var(--spacing-page) 40px;
      transition: transform var(--transition-slide), opacity var(--transition-slide);
      will-change: transform;
    }
    .quiz-stage.stage-center {
      position: relative;
      transform: translateX(0);
      opacity: 1;
    }
    .quiz-stage.stage-left {
      transform: translateX(-105%);
      opacity: 0;
    }
    .quiz-stage.stage-right {
      transform: translateX(105%);
      opacity: 0;
    }
    .question-text {
      font-size: 20px;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 28px;
    }
    .options-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .option-btn {
      width: 100%;
      text-align: left;
      padding: 16px 20px;
      font-size: 15px;
      line-height: 1.5;
      background: var(--color-card);
      border: 2px solid var(--color-border);
      border-radius: var(--radius-md);
      transition: border-color var(--transition-fast), background var(--transition-fast), transform 150ms ease;
    }
    .option-btn:active {
      transform: scale(0.98);
    }
    .option-btn.selected {
      border-color: var(--color-accent);
      background: var(--color-accent-light);
      animation: optionBounce 250ms ease;
    }
    @keyframes optionBounce {
      0% { transform: scale(1); }
      40% { transform: scale(0.97); }
      100% { transform: scale(1); }
    }
    .option-label {
      font-weight: 600;
      color: var(--color-accent);
      margin-right: 8px;
    }

    /* ============================================================
       Loading View
       ============================================================ */
    .loading-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 40px var(--spacing-page);
    }
    .loading-emoji {
      font-size: 64px;
      animation: shuttleSpin 2s ease-in-out infinite;
    }
    @keyframes shuttleSpin {
      0% { transform: rotate(0deg) scale(1); }
      25% { transform: rotate(15deg) scale(1.1); }
      50% { transform: rotate(0deg) scale(1); }
      75% { transform: rotate(-15deg) scale(1.1); }
      100% { transform: rotate(0deg) scale(1); }
    }
    .loading-text {
      font-size: 18px;
      font-weight: 500;
      margin-top: 24px;
      color: var(--color-text);
    }
    .loading-dots {
      font-size: 24px;
      margin-top: 8px;
      color: var(--color-accent);
      letter-spacing: 4px;
    }
    .loading-dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
      100% { content: ''; }
    }

    /* ============================================================
       Result View
       ============================================================ */
    .result-container {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 40px var(--spacing-page) 60px;
    }

    /* Hero */
    .result-hero {
      text-align: center;
      margin-bottom: 32px;
    }
    .result-emoji {
      font-size: 72px;
      line-height: 1;
      margin-bottom: 16px;
    }
    .result-code {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 6px;
      color: var(--color-primary-dark);
      margin-bottom: 4px;
    }
    .result-name {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .dimension-tags {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .dim-tag {
      display: inline-block;
      padding: 4px 14px;
      font-size: 13px;
      font-weight: 500;
      background: var(--color-accent-light);
      color: var(--color-accent-dark);
      border-radius: 20px;
    }
    .result-tagline {
      font-size: 16px;
      color: var(--color-text-secondary);
      font-style: italic;
    }

    /* Confidence */
    .result-confidence {
      text-align: center;
      font-size: 14px;
      color: var(--color-primary-dark);
      font-weight: 500;
      margin-bottom: 28px;
      padding: 8px 16px;
      background: rgba(46,204,113,0.08);
      border-radius: var(--radius-sm);
      display: inline-block;
      width: 100%;
    }

    /* Section cards */
    .result-section {
      background: var(--color-card);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-card);
    }
    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-text-secondary);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Description */
    .result-description {
      font-size: 15px;
      line-height: 1.8;
    }

    /* Archetype */
    .archetype-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--color-primary-dark);
      margin-bottom: 4px;
    }
    .archetype-desc {
      font-size: 14px;
      color: var(--color-text-secondary);
      line-height: 1.6;
    }

    /* Stats */
    .stat-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .stat-row:last-child { margin-bottom: 0; }
    .stat-emoji { font-size: 16px; flex-shrink: 0; width: 24px; text-align: center; }
    .stat-label { font-size: 13px; width: 56px; flex-shrink: 0; color: var(--color-text-secondary); }
    .stat-bar-track {
      flex: 1;
      height: 10px;
      background: #F0F0EB;
      border-radius: 5px;
      overflow: hidden;
    }
    .stat-bar-fill {
      height: 100%;
      border-radius: 5px;
      background: linear-gradient(90deg, var(--color-primary), var(--color-accent));
      width: 0%;
      transition: width 800ms ease-out;
    }
    .stat-value {
      font-size: 14px;
      font-weight: 700;
      width: 28px;
      text-align: right;
      flex-shrink: 0;
    }

    /* Traits */
    .trait-item {
      padding: 10px 0;
      border-bottom: 1px solid var(--color-border);
      font-size: 14px;
      line-height: 1.6;
    }
    .trait-item:last-child { border-bottom: none; }
    .trait-label {
      font-weight: 600;
      margin-right: 8px;
    }

    /* Match cards */
    .match-card {
      border-left: 4px solid;
      padding-left: 16px;
    }
    .match-card.partner { border-left-color: var(--color-partner-border); background: var(--color-partner); }
    .match-card.rival { border-left-color: var(--color-rival-border); background: var(--color-rival); }
    .match-type-header {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .match-type-name {
      font-size: 14px;
      color: var(--color-text-secondary);
      margin-bottom: 8px;
    }
    .match-reason {
      font-size: 14px;
      line-height: 1.6;
    }

    /* Share buttons */
    .share-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 24px 0;
    }
    .share-btn {
      width: 100%;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 600;
      border-radius: var(--radius-md);
      text-align: center;
      transition: transform var(--transition-fast);
    }
    .share-btn:active { transform: scale(0.97); }
    .share-btn.primary {
      background: var(--color-primary);
      color: #fff;
    }
    .share-btn.secondary {
      background: var(--color-card);
      color: var(--color-text);
      border: 2px solid var(--color-border);
    }

    /* Gallery */
    .gallery-title {
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .gallery-subtitle {
      text-align: center;
      font-size: 13px;
      color: var(--color-text-secondary);
      margin-bottom: 20px;
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .gallery-item {
      text-align: center;
      padding: 10px 4px;
      border-radius: var(--radius-sm);
      border: 2px solid transparent;
      transition: all var(--transition-fast);
    }
    .gallery-item.active {
      border-color: var(--color-primary);
      background: rgba(46,204,113,0.08);
    }
    .gallery-item.locked {
      opacity: 0.35;
      filter: grayscale(60%);
    }
    .gallery-emoji { font-size: 28px; line-height: 1; margin-bottom: 4px; }
    .gallery-code { font-size: 9px; font-weight: 700; color: var(--color-text-secondary); display: block; }
    .gallery-name { font-size: 10px; color: var(--color-text-secondary); display: block; margin-top: 2px; }

    /* Footer */
    .result-footer {
      text-align: center;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--color-border);
    }
    .disclaimer {
      font-size: 12px;
      color: var(--color-text-secondary);
      line-height: 1.8;
      margin-bottom: 20px;
    }
    .restart-btn {
      padding: 12px 32px;
      font-size: 14px;
      color: var(--color-text-secondary);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      transition: all var(--transition-fast);
    }
    .restart-btn:active {
      background: var(--color-border);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--color-text);
      color: #fff;
      padding: 12px 24px;
      border-radius: var(--radius-lg);
      font-size: 14px;
      opacity: 0;
      transition: opacity 300ms, transform 300ms;
      z-index: 100;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <!-- ============================================================
       View 1: Home
       ============================================================ -->
  <section id="view-home" class="view active">
    <div class="home-content">
      <div class="hero-emoji">🏸</div>
      <h1 class="home-title">你是哪种球场灵魂？</h1>
      <p class="home-subtitle">24 道球场情景题，找到你的羽毛球人格</p>
      <p class="home-subtitle">16 种灵魂 · 4 大维度 · 找到你的最佳搭档</p>
      <button class="cta-primary" id="btn-start">开始测试 🏸</button>
      <div class="dimension-preview">
        <span>🗡️ 进攻 vs 防守</span>
        <span>🎯 技巧 vs 力量</span>
        <span>📋 计划 vs 随性</span>
        <span>🧘 佛系 vs 上头</span>
      </div>
    </div>
  </section>

  <!-- ============================================================
       View 2: Quiz
       ============================================================ -->
  <section id="view-quiz" class="view">
    <div class="quiz-header">
      <div class="progress-row">
        <span id="progress-text">1 / 24</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <button class="back-btn" id="btn-back">← 上一题</button>
    </div>
    <div class="quiz-stage-container" id="stage-container">
      <div class="quiz-stage stage-center" id="stage-a"></div>
      <div class="quiz-stage stage-right" id="stage-b"></div>
    </div>
  </section>

  <!-- ============================================================
       View 3: Loading
       ============================================================ -->
  <section id="view-loading" class="view">
    <div class="loading-content">
      <div class="loading-emoji">🏸</div>
      <p class="loading-text">正在分析你的球场灵魂...</p>
      <div class="loading-dots"></div>
    </div>
  </section>

  <!-- ============================================================
       View 4: Result
       ============================================================ -->
  <section id="view-result" class="view">
    <div class="result-container" id="result-container">
      <!-- Dynamically populated by app.js -->
    </div>
  </section>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script src="js/data.js" defer></script>
  <script src="js/app.js" defer></script>
</body>
</html>
