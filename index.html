<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>BBTI 羽毛球人格测试 🏸</title>
  <meta name="description" content="16道球场情景题，找到你的球场灵魂。16种羽毛球人格，你是哪一种？">
  <meta property="og:title" content="BBTI 羽毛球人格测试 🏸">
  <meta property="og:description" content="16道球场情景题，找到你的球场灵魂">
  <meta property="og:type" content="website">
  <style>
    /* ============================================================
       Design Tokens
       ============================================================ */
    :root {
      --color-primary: #2EBD59;
      --color-primary-dark: #27AE60;
      --color-accent: #FF6B35;
      --color-accent-light: #FFF3E0;
      --color-accent-dark: #E85A2D;
      --color-bg: #FFF9F0;
      --color-bg-alt: #FFF5E6;
      --color-text: #2C3E50;
      --color-text-secondary: #7A8B8C;
      --color-card: #FFFFFF;
      --color-border: #EBE3D5;
      --color-partner: rgba(46,189,89,0.10);
      --color-partner-border: #2EBD59;
      --color-rival: rgba(231,76,60,0.10);
      --color-rival-border: #E74C3C;
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --shadow-card: 0 4px 12px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
      --shadow-btn: 0 4px 20px rgba(255,107,53,0.25);
      --transition-fast: 200ms ease;
      --transition-slide: 350ms cubic-bezier(0.4, 0, 0.2, 1);
      --max-width: 440px;
      --spacing-page: 20px;
    }

    /* ============================================================
       Reset & Base
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
      background:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 58px,
          rgba(255,255,255,0.7) 58px,
          rgba(255,255,255,0.7) 60px
        ),
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 58px,
          rgba(255,255,255,0.7) 58px,
          rgba(255,255,255,0.7) 60px
        ),
        var(--color-bg);
      color: var(--color-text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overscroll-behavior: none;
      min-height: 100vh;
    }
    button {
      font-family: inherit;
      font-size: inherit;
      cursor: pointer;
      border: none;
      background: none;
      color: inherit;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    img { max-width: 100%; display: block; }

    /* ============================================================
       View System
       ============================================================ */
    .view {
      display: none;
      min-height: 100vh;
      width: 100%;
    }
    .view.active {
      display: flex;
      flex-direction: column;
      animation: fadeIn 300ms ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .page-container {
      width: 100%;
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 var(--spacing-page);
    }

    /* ============================================================
       Home View
       ============================================================ */
    .home-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 40px var(--spacing-page) calc(40px + env(safe-area-inset-bottom));
    }
    .hero-emoji {
      font-size: 80px;
      line-height: 1;
      margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .home-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }
    .home-subtitle {
      font-size: 16px;
      color: var(--color-text-secondary);
      margin-bottom: 6px;
      line-height: 1.6;
    }
    .cta-primary {
      display: inline-block;
      margin-top: 32px;
      padding: 16px 48px;
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, var(--color-accent), #FF8A5C);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-btn);
      transition: transform var(--transition-fast), box-shadow var(--transition-fast);
    }
    .cta-primary:active {
      transform: scale(0.97);
      box-shadow: 0 2px 8px rgba(255,107,53,0.25);
    }
    .dimension-preview {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 16px;
      margin-top: 36px;
      font-size: 14px;
      color: var(--color-text-secondary);
    }
    .dimension-preview span {
      white-space: nowrap;
    }

    /* ============================================================
       Quiz View
       ============================================================ */
    .quiz-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--color-bg);
      padding: 16px var(--spacing-page) 12px;
      max-width: var(--max-width);
      margin: 0 auto;
      width: 100%;
    }
    .progress-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: var(--color-text-secondary);
      margin-bottom: 8px;
    }
    .progress-track {
      width: 100%;
      height: 32px;
      background: var(--color-border);
      border-radius: 16px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--color-accent), var(--color-primary));
      border-radius: 16px;
      transition: width var(--transition-slide);
      width: 0%;
      position: relative;
    }
    .progress-fill::after {
      content: '🏸';
      position: absolute;
      right: -12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 28px;
      line-height: 1;
      filter: drop-shadow(0 0 4px rgba(255,107,53,0.4));
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 14px;
      color: var(--color-text-secondary);
      padding: 8px 0;
      margin-top: 4px;
      transition: color var(--transition-fast);
      visibility: hidden;
    }
    .back-btn.visible { visibility: visible; }
    .back-btn:active { color: var(--color-text); }

    .quiz-stage-container {
      position: relative;
      overflow: hidden;
      flex: 1;
      max-width: var(--max-width);
      margin: 0 auto;
      width: 100%;
    }
    .quiz-stage {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 20px var(--spacing-page) 40px;
      transition: transform var(--transition-slide), opacity var(--transition-slide);
      will-change: transform;
    }
    .quiz-stage.stage-center {
      position: relative;
      transform: translateX(0);
      opacity: 1;
    }
    .quiz-stage.stage-left {
      transform: translateX(-105%);
      opacity: 0;
    }
    .quiz-stage.stage-right {
      transform: translateX(105%);
      opacity: 0;
    }
    .scene-text {
      font-size: 13px;
      font-style: italic;
      color: var(--color-text-secondary);
      margin-bottom: 12px;
      line-height: 1.6;
      opacity: 0.75;
      padding-left: 2px;
    }
    .question-text {
      font-size: 20px;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 28px;
    }
    .options-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .option-btn {
      position: relative;
      overflow: hidden;
      width: 100%;
      text-align: left;
      padding: 16px 20px;
      font-size: 15px;
      line-height: 1.5;
      background: var(--color-card);
      border: 2px solid var(--color-border);
      border-radius: var(--radius-md);
      transition: border-color var(--transition-fast), background var(--transition-fast), transform 150ms ease;
    }
    .option-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(255,107,53,0.10) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 200ms ease;
      pointer-events: none;
    }
    .option-btn:active::after {
      opacity: 1;
    }
    .option-btn:active {
      transform: scale(0.98);
    }
    .option-btn.selected {
      border-color: var(--color-accent);
      background: var(--color-accent-light);
      animation: optionBounce 250ms ease;
    }
    @keyframes optionBounce {
      0% { transform: scale(1); }
      40% { transform: scale(0.97); }
      100% { transform: scale(1); }
    }
    /* ── Image option grid (Q16 memes) ── */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .option-img-btn {
      text-align: center;
      padding: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .option-img {
      width: 100%;
      max-width: 140px;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: var(--radius-sm);
    }
    .option-img-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text-secondary);
    }
    .option-img-btn.selected .option-img-label {
      color: var(--color-accent);
    }

    .option-label {
      font-weight: 600;
      color: var(--color-accent);
      margin-right: 8px;
    }

    /* ============================================================
       Loading View
       ============================================================ */
    .loading-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 40px var(--spacing-page) calc(40px + env(safe-area-inset-bottom));
    }
    .loading-emoji {
      font-size: 64px;
      animation: shuttleSpin 2s ease-in-out infinite;
    }
    @keyframes shuttleSpin {
      0% { transform: rotate(0deg) scale(1); }
      25% { transform: rotate(15deg) scale(1.1); }
      50% { transform: rotate(0deg) scale(1); }
      75% { transform: rotate(-15deg) scale(1.1); }
      100% { transform: rotate(0deg) scale(1); }
    }
    .loading-subtext {
      font-size: 16px;
      font-weight: 500;
      margin-top: 24px;
      color: var(--color-text);
      min-height: 1.6em;
      transition: opacity 200ms ease;
    }

    /* ============================================================
       Result View
       ============================================================ */
    .result-container {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 40px var(--spacing-page) 60px;
    }

    /* Hero */
    .result-hero {
      text-align: center;
      margin-bottom: 20px;
    }
    .result-avatar {
      width: 110px;
      height: 110px;
      border-radius: var(--radius-md);
      object-fit: cover;
      margin: 0 auto 12px;
      display: block;
      border: 3px solid var(--color-border);
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      transition: transform 200ms ease;
    }
    .result-avatar:hover { transform: scale(1.05); }
    .result-code {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 5px;
      color: var(--color-primary-dark);
      margin-bottom: 2px;
    }
    .result-name {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .result-slogan {
      font-size: 15px;
      font-weight: 700;
      color: var(--color-primary);
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .dimension-tags {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .dim-tag {
      display: inline-block;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 500;
      background: var(--color-accent-light);
      color: var(--color-accent-dark);
      border-radius: 20px;
    }
    .result-tagline {
      font-size: 13px;
      color: var(--color-text-secondary);
      font-style: italic;
    }

    /* Confidence */
    .result-confidence {
      text-align: center;
      font-size: 14px;
      color: var(--color-primary-dark);
      font-weight: 500;
      margin-bottom: 28px;
      padding: 8px 16px;
      background: rgba(46,189,89,0.10);
      border-radius: var(--radius-sm);
      display: inline-block;
      width: 100%;
    }

    /* Quadrant Chart */
    .quadrant-chart {
      position: relative;
      width: 100%;
      max-width: 260px;
      aspect-ratio: 1;
      margin: 4px auto 0;
      touch-action: pan-y;
      pointer-events: none;
    }
    .chart-legend {
      pointer-events: auto;
    }
    .quadrant-axis-x, .quadrant-axis-y {
      position: absolute;
      background: var(--color-border);
      box-shadow: 0 0 6px rgba(0,0,0,0.06);
      animation: quadrantFadeIn 500ms ease forwards;
      opacity: 0;
    }
    .quadrant-axis-x {
      width: 100%;
      height: 1px;
      top: 50%;
      left: 0;
    }
    .quadrant-axis-y {
      height: 100%;
      width: 1px;
      left: 50%;
      top: 0;
    }
    .quadrant-label {
      position: absolute;
      font-size: 12px;
      color: var(--color-text-secondary);
      animation: quadrantFadeIn 500ms ease forwards;
      opacity: 0;
      white-space: nowrap;
    }
    .label-top { top: 2px; left: 50%; transform: translateX(-50%); }
    .label-bottom { bottom: 2px; left: 50%; transform: translateX(-50%); }
    .label-left { left: 2px; top: 50%; transform: translateY(-50%); }
    .label-right { right: 2px; top: 50%; transform: translateY(-50%); }
    .quadrant-dot {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      transition: left 800ms cubic-bezier(0.34, 1.56, 0.64, 1), top 800ms cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 2;
    }
    .quadrant-dot.zen-plan {
      background: var(--color-primary);
      border: 3px solid var(--color-primary);
      box-shadow: 0 0 12px rgba(46,189,89,0.4);
    }
    .quadrant-dot.zen-random {
      background: transparent;
      border: 3px solid var(--color-primary);
      box-shadow: 0 0 12px rgba(46,189,89,0.4);
    }
    .quadrant-dot.heated-plan {
      background: var(--color-accent);
      border: 3px solid var(--color-accent);
      box-shadow: 0 0 12px rgba(255,107,53,0.5);
    }
    .quadrant-dot.heated-random {
      background: transparent;
      border: 3px solid var(--color-accent);
      box-shadow: 0 0 12px rgba(255,107,53,0.5);
    }
    .chart-legend {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 11px;
      color: var(--color-text-secondary);
      margin-top: 14px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .legend-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-dot.filled-cyan { background: var(--color-primary); }
    .legend-dot.hollow-cyan { background: transparent; border: 2px solid var(--color-primary); }
    .legend-dot.filled-orange { background: var(--color-accent); }
    .legend-dot.hollow-orange { background: transparent; border: 2px solid var(--color-accent); }
    @keyframes quadrantFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes dotBreathe {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.15); }
    }
    .quadrant-corner {
      position: absolute;
      font-size: 10px;
      color: var(--color-text-secondary);
      opacity: 0.5;
      line-height: 1.2;
    }
    .corner-tl { top: 8px; left: 8px; }
    .corner-tr { top: 8px; right: 8px; text-align: right; }
    .corner-bl { bottom: 8px; left: 8px; }
    .corner-br { bottom: 8px; right: 8px; text-align: right; }
    .dot-label {
      position: absolute;
      font-size: 11px;
      font-weight: 600;
      color: var(--color-text);
      background: var(--color-card);
      padding: 2px 8px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      white-space: nowrap;
      transform: translateX(-50%);
      opacity: 0;
      transition: opacity 400ms ease 900ms;
      z-index: 3;
    }
    .dot-label.show { opacity: 1; }

    /* Section cards */
    .result-section {
      background: var(--color-card);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      margin-bottom: 10px;
      box-shadow: var(--shadow-card);
      border: 1px solid var(--color-border);
      transition: transform 200ms ease, box-shadow 200ms ease;
    }
    .result-section:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.03);
    }
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text-secondary);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Description */
    .result-description {
      font-size: 15px;
      line-height: 1.8;
    }

    /* Archetype */
    .archetype-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--color-primary-dark);
      margin-bottom: 2px;
    }
    .archetype-desc {
      font-size: 13px;
      color: var(--color-text-secondary);
      line-height: 1.5;
    }

    /* Stats */
    .stat-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .stat-row:last-child { margin-bottom: 0; }
    .stat-emoji { font-size: 16px; flex-shrink: 0; width: 24px; text-align: center; }
    .stat-label { font-size: 13px; width: 56px; flex-shrink: 0; color: var(--color-text-secondary); }
    .stat-bar-track {
      flex: 1;
      height: 10px;
      background: #EEDDCC;
      border-radius: 5px;
      overflow: hidden;
    }
    .stat-bar-fill {
      height: 100%;
      border-radius: 5px;
      background: linear-gradient(90deg, var(--color-primary), var(--color-accent));
      width: 0%;
      transition: width 800ms ease-out;
    }
    .stat-value {
      font-size: 14px;
      font-weight: 700;
      width: 28px;
      text-align: right;
      flex-shrink: 0;
    }

    /* Traits */
    .trait-item {
      padding: 7px 0;
      border-bottom: 1px solid var(--color-border);
      font-size: 13px;
      line-height: 1.5;
    }
    .trait-item:last-child { border-bottom: none; }
    .trait-label {
      font-weight: 600;
      margin-right: 8px;
    }
    .quote-copyable {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-primary-dark);
      cursor: pointer;
      transition: color 200ms ease;
    }
    .quote-copyable:active {
      color: var(--color-primary);
    }

    /* Match cards */
    .match-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }
    .match-card {
      position: relative;
      text-align: left;
      padding: 12px 10px 10px !important;
      margin-bottom: 0 !important;
      overflow: hidden;
    }
    .match-card::before {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 3px;
      border-radius: var(--radius-md) var(--radius-md) 0 0;
    }
    .match-card.partner { background: var(--color-partner); }
    .match-card.partner::before { background: linear-gradient(to right, #2EBD59, #A8E6CF); }
    .match-card.rival { background: var(--color-rival); }
    .match-card.rival::before { background: linear-gradient(to right, #E74C3C, #F5B7B1); }
    .match-type-header {
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--color-text-secondary);
    }
    .match-body {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .match-avatar {
      width: 42px;
      height: 42px;
      border-radius: var(--radius-sm);
      object-fit: cover;
      border: 2px solid var(--color-border);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      flex-shrink: 0;
    }
    .match-text {
      flex: 1;
      min-width: 0;
    }
    .match-type-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: 2px;
    }
    .match-card .match-reason {
      font-size: 11px;
      line-height: 1.3;
      color: var(--color-text-secondary);
    }
    .match-short-tag {
      font-size: 12px;
      font-weight: 600;
      margin-top: 6px;
      padding: 3px 8px;
      display: inline-block;
      border-radius: 12px;
    }
    .partner .match-short-tag {
      color: #2EBD59;
      background: rgba(46,189,89,0.15);
    }
    .rival .match-short-tag {
      color: #E74C3C;
      background: rgba(231,76,60,0.15);
    }

    /* Share buttons */
    .share-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 16px 0;
    }
    .share-btn {
      width: 100%;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      border-radius: var(--radius-md);
      text-align: center;
      transition: transform var(--transition-fast);
    }
    .share-btn:active { transform: scale(0.97); }
    .share-btn.primary {
      background: linear-gradient(135deg, var(--color-primary), #5CD87A);
      color: #fff;
    }
    .share-btn.secondary {
      background: var(--color-card);
      color: var(--color-text);
      border: 2px solid var(--color-border);
    }

    /* Gallery */
    .gallery-title {
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .gallery-subtitle {
      text-align: center;
      font-size: 13px;
      color: var(--color-text-secondary);
      margin-bottom: 20px;
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .gallery-item {
      text-align: center;
      padding: 10px 4px;
      border-radius: var(--radius-sm);
      border: 2px solid transparent;
      transition: all var(--transition-fast);
    }
    .gallery-item.active {
      border-color: var(--color-primary);
      background: rgba(46,189,89,0.10);
    }
    .gallery-item.locked {
      opacity: 0.35;
      filter: grayscale(60%);
    }
    .gallery-emoji { font-size: 28px; line-height: 1; margin-bottom: 4px; }
    .gallery-code { font-size: 9px; font-weight: 700; color: var(--color-text-secondary); display: block; }
    .gallery-name { font-size: 10px; color: var(--color-text-secondary); display: block; margin-top: 2px; }

    /* Footer */
    .result-footer {
      text-align: center;
      margin-top: 20px;
      padding-top: 16px;
      padding-bottom: env(safe-area-inset-bottom);
      border-top: 1px solid var(--color-border);
    }
    .disclaimer {
      font-size: 12px;
      color: var(--color-text-secondary);
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .restart-btn {
      padding: 12px 32px;
      font-size: 14px;
      color: var(--color-text-secondary);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      transition: all var(--transition-fast);
    }
    .restart-btn:active {
      background: var(--color-border);
    }
    .author-credit {
      margin-top: 16px;
      font-size: 12px;
      color: var(--color-text-secondary);
      opacity: 0.6;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: calc(80px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(44,62,80,0.92);
      color: #FFFFFF;
      padding: 12px 24px;
      border-radius: var(--radius-lg);
      font-size: 14px;
      opacity: 0;
      transition: opacity 300ms, transform 300ms;
      z-index: 100;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Share guide overlay */
    .share-guide-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 250ms ease;
      padding: 24px;
    }
    .share-guide-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }
    .share-guide-card {
      background: var(--color-card);
      border-radius: var(--radius-lg);
      padding: 28px 24px;
      max-width: 340px;
      width: 100%;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    }
    .share-guide-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }
    .share-guide-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 16px;
    }
    .share-guide-text {
      background: var(--color-bg);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--color-text-secondary);
      text-align: left;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 160px;
      overflow-y: auto;
      margin-bottom: 16px;
    }
    .share-guide-hint {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-accent);
      margin-bottom: 20px;
    }
    .share-guide-btn {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      background: linear-gradient(135deg, var(--color-primary), #5CD87A);
      color: #fff;
      border-radius: var(--radius-md);
    }

    /* Share card overlay */
    .share-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 250ms ease;
    }
    .share-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }
    .share-overlay-inner {
      background: var(--color-card);
      border-radius: var(--radius-md);
      padding: 20px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    }
    .share-overlay-inner canvas {
      width: 100%;
      height: auto;
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
    }
    .share-overlay-actions {
      display: flex;
      gap: 10px;
    }
    .share-overlay-actions button {
      flex: 1;
      padding: 12px 0;
      font-size: 14px;
      font-weight: 600;
      border-radius: var(--radius-sm);
      transition: transform 150ms ease;
    }
    .share-overlay-actions button:active { transform: scale(0.97); }
    .share-card-save {
      background: linear-gradient(135deg, var(--color-primary), #5CD87A);
      color: #fff;
    }
    .share-card-close {
      background: var(--color-card);
      color: var(--color-text-secondary);
      border: 1px solid var(--color-border);
    }
  </style>
</head>
<body>

  <!-- ============================================================
       View 1: Home
       ============================================================ -->
  <section id="view-home" class="view active">
    <div class="home-content">
      <div class="hero-emoji">🏸</div>
      <h1 class="home-title">你是哪种球场灵魂？</h1>
      <p class="home-subtitle">16 道球场情景题，找到你的羽毛球人格</p>
      <p class="home-subtitle">16 种灵魂 · 4 大维度 · 找到你的最佳搭档</p>

      <div class="dimension-preview">
        <span>🗡️ 进攻 vs 防守</span>
        <span>🎯 技巧 vs 力量</span>
        <span>📋 计划 vs 随性</span>
        <span>🧘 佛系 vs 上头</span>
      </div>
    </div>
  </section>

  <!-- ============================================================
       View 2: Quiz
       ============================================================ -->
  <section id="view-quiz" class="view">
    <div class="quiz-header">
      <div class="progress-row">
        <span id="progress-text">1 / 16</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>

      <div class="quiz-stage stage-right" id="stage-b"></div>
    </div>
  </section>

  <!-- ============================================================
       View 3: Loading
       ============================================================ -->
  <section id="view-loading" class="view">
    <div class="loading-content">
      <div class="loading-emoji">🏸</div>
      <p class="loading-subtext" id="loading-subtext">正在分析你的球场灵魂...</p>
    </div>

  <!-- ============================================================
       View 4: Result
       ============================================================ -->
  <section id="view-result" class="view">

      <!-- Dynamically populated by app.js -->
    </div>
  </section>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <!-- Share card overlay -->
  <div class="share-overlay" id="share-overlay">
    <div class="share-overlay-inner">
      <canvas id="share-canvas"></canvas>
      <div class="share-overlay-actions">
        <button class="share-card-save" id="btn-save-card">保存图片</button>
        <button class="share-card-close" id="btn-close-card">关闭</button>
      </div>
    </div>
  </div>

  <script src="js/data.js" defer></script>
  <script src="js/app.js" defer></script>
